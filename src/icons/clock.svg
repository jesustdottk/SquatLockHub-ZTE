<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo sólido NEGRO (Sin transparencia para evitar el fallo del Launcher) -->
  <rect width="128" height="128" fill="#1a1a1a"/>
  
  <!-- Círculo de Fondo -->
  <circle cx="64" cy="64" r="45" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  
  <!-- Anillo de Progreso (Reloj) -->
  <circle cx="64" cy="64" r="45" fill="none" stroke="#00FF41" stroke-width="10" stroke-dasharray="180, 283" stroke-linecap="butt" transform="rotate(-90 64 64)"/>
  
  <!-- Punto Central -->
  <circle cx="64" cy="64" r="8" fill="#00FF41"/>
  
  <!-- Borde de Contorno para asegurar visibilidad -->
  <rect x="2" y="2" width="124" height="124" rx="22" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
</svg>
