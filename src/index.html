<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>SquatLock</title>
</head>
<body class="theme-obsidian">
    <div id="stealth-overlay" class="hidden"></div>
    <div id="app">
        <header>
            <h1 id="status-title">WORK MODE</h1>
        </header>
        
        <main>
            <div id="timer-display">45:00</div>
            <div id="squat-counter" class="hidden">
                <p>SQUATS REMAINING</p>
                <div id="count">10</div>
            </div>
            <div id="calibration-info" class="small hidden">HOLD STILL AT CHEST...</div>
            <div id="flip-hint" class="small">FLIP DOWN TO START</div>
        </main>

        <footer>
            <button id="main-btn">START SESSION</button>
        </footer>
    </div>
    <div id="lock-screen" class="hidden">
        <button id="reset-btn" style="position:fixed; top:5px; left:5px; background:rgba(255,0,0,0.8); color:white; border:none; padding:5px; font-size:10px; z-index:10001;">RESET MEMORY</button>
        <div class="lock-content">
            <h1>LOCKED</h1>
            <p>DO 10 SQUATS TO CONTINUE</p>
        </div>
    </div>
    <audio id="alarm-channel-bait" mozAudioChannel="alarm" loop></audio>
    <div id="debug-log" style="text-align:left; background:rgba(0,10,0,0.9); padding:5px; font-size:9px; height:45px; overflow-y:scroll; border-bottom:1px solid #00FF41; position:fixed; top:0; left:0; width:100%; color:#00FF41; z-index:9999;">[v3.4.10 Ready]</div>
    <div id="version-tag" style="position:fixed; bottom:5px; right:5px; font-size:8px; color:#444; z-index:10000;">v3.4.10-STABLE</div>
    <script src="app.js"></script>
</body>
</html>
