<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>SquatLock</title>
</head>
<body class="theme-obsidian">
    <div id="stealth-overlay" class="hidden"></div>
    <div id="app">
        <header>
            <h1 id="status-title">WORK MODE</h1>
        </header>
        
        <main>
            <div id="timer-display">45:00</div>
            <div id="squat-counter" class="hidden">
                <p>SQUATS REMAINING</p>
                <div id="count">10</div>
            </div>
            <div id="calibration-info" class="small hidden">HOLD STILL AT CHEST...</div>
            <div id="flip-hint" class="small">FLIP DOWN TO START</div>
        </main>

        <footer>
            <button id="main-btn">START SESSION</button>
            <div id="version-tag">v2.1.0-FOCUS</div>
        </footer>
    </div>
    <div id="lock-screen" class="hidden">
        <div class="lock-content">
            <h1>LOCKED</h1>
            <p>DO 10 SQUATS TO CONTINUE</p>
        </div>
    </div>
    <div id="debug-log" style="text-align:left; background:rgba(0,0,0,0.8); padding:5px; font-size:9px; height:60px; overflow-y:scroll; border-top:1px solid #333; position:fixed; bottom:0; left:0; width:100%; color:#00FF41; z-index:9999;">[B2G Ready]</div>
    <script src="app.js"></script>
</body>
</html>
