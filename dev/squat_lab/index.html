<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>Squat Lab v1.1</title>
    <style>
        body { background: #1a1a1a; color: #00FF41; font-family: monospace; text-align: center; margin: 0; padding: 10px; }
        #magnitude { font-size: 60px; font-weight: bold; margin: 10px 0; }
        .state-box { font-size: 20px; padding: 8px; border: 1px solid #00FF41; margin: 5px; }
        .stats { font-size: 12px; text-align: left; padding: 10px; border: 1px solid #333; }
        button { background: #333; color: #ff4141; border: 1px solid #ff4141; padding: 10px; width: 90%; margin-top: 10px; }
        #console { text-align: left; background: #000; padding: 8px; font-size: 9px; height: 100px; overflow-y: scroll; border: 1px solid #333; margin-top: 10px; color: #00FF41; }
        footer { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>SQUAT TELEMETRY 1.1</h1>
    <div id="magnitude">9.80</div>
    <div id="state" class="state-box">STILL</div>
    <div id="reps">REPS: 0</div>
    
    <div class="stats">
        PEAK: <span id="peak">-</span> | DIP: <span id="dip">-</span>
    </div>
    
    <button id="btn-reset">RESET STATS</button>
    <div id="console"></div>
    
    <footer>ZTE Open - v1.1 LEGACY</footer>
    <script src="app.js"></script>
</body>
</html>
