<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>Audio Forge v1.5 (Mario)</title>
    <style>
        body { background: #1a1a1a; color: #ff9d00; font-family: monospace; text-align: center; margin: 0; padding: 10px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        button { background: #333; color: white; border: 1px solid #ff9d00; padding: 15px; flex: 1 1 40%; font-size: 14px; }
        .mario-btn { background: #e52521; color: white; border-color: #ff0; font-weight: bold; }
        #stop { background: #300; border-color: red; color: red; width: 100%; flex: 1 1 100%; }
        #console { text-align: left; background: #000; padding: 8px; font-size: 10px; height: 180px; overflow-y: scroll; border: 1px solid #333; margin-top: 10px; color: #ff9d00; }
        footer { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>AUDIO FORGE v1.5</h1>
    
    <div class="btn-group">
        <button id="btn-beep">SIMPLE BEEP</button>
        <button id="btn-scale">DIAG SCALE</button>
        <button id="btn-start" class="mario-btn">MARIO START</button>
        <button id="btn-castle" class="mario-btn">BOWSER CASTLE</button>
        <button id="btn-clear" class="mario-btn">STAGE CLEAR</button>
        <button id="stop">STOP ALL AUDIO</button>
    </div>

    <div id="console"></div>
    
    <footer>ZTE Open - HARD LEGACY LABORATORY</footer>
    <script src="app.js"></script>
</body>
</html>
